name: Build and Release

on:
  # Only run after CI completes on main, so we never publish a build that
  # failed its tests. (workflow_run fires on the default branch's copy of this
  # file, and only for the CI workflow's own triggers — i.e. pushes to main.)
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    # Gate on CI success. On workflow_dispatch there is no triggering run, so
    # allow that through too.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build the exact commit CI validated (workflow_run checks out the
          # default branch tip by default, which may have moved on).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build --target runtime_loader libRuntimeRosettax87 --parallel

      - name: Verify binaries
        run: |
          echo "=== runtime_loader ==="
          file build/bin/runtime_loader
          echo ""
          echo "=== libRuntimeRosettax87 ==="
          file build/bin/libRuntimeRosettax87

      - name: Package artifacts
        run: |
          mkdir -p release
          cp build/bin/runtime_loader release/
          cp build/bin/libRuntimeRosettax87 release/
          cd release
          tar czf ../rosettax87-jit-macos-arm64.tar.gz .

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ github.event.workflow_run.head_sha || github.sha }})
          prerelease: true
          make_latest: false
          files: |
            rosettax87-jit-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
